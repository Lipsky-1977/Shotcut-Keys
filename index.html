<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>图形软件快捷键 · 总览</title>
<style>
:root{
  --bg:#f5f5f7;--card:#fff;--border:rgba(0,0,0,.06);--text:#1d1d1f;--text2:#8e8e93;
  --shadow:0 2px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);--radius:16px;
  --c1:#FF6A00;--c2:#00C853;--c3:#0066FF;--c4:#E63946;--c5:#7B2FF7;
  --c6:#2B7DE9;--c7:#00B8D4;--c8:#7B1FA2;--c9:#EA7600;--c10:#636366;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--card:#2c2c2e;--border:rgba(255,255,255,.06);--text:#f5f5f7;--text2:#98989d;--shadow:0 2px 12px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.2)}
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
.header{text-align:center;padding:36px 20px 14px}
.header h1{font-size:25px;font-weight:800;letter-spacing:-.4px}
.header .sub{font-size:13px;color:var(--text2);margin-top:3px}
.header .bar{width:36px;height:3px;background:var(--text);opacity:.15;border-radius:2px;margin:10px auto 0}
.main{max-width:680px;margin:0 auto;padding:6px 14px 36px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;
  background:var(--card);border-radius:var(--radius);padding:18px 12px 14px;
  border:1px solid var(--border);cursor:pointer;text-decoration:none;color:var(--text);
  transition:all .2s;box-shadow:var(--shadow);animation:fadeUp .3s ease-out both}
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:.04s}
.card:nth-child(3){animation-delay:.08s}
.card:nth-child(4){animation-delay:.12s}
.card:nth-child(5){animation-delay:.16s}
.card:nth-child(6){animation-delay:.20s}
.card:nth-child(7){animation-delay:.24s}
.card:nth-child(8){animation-delay:.28s}
.card:nth-child(9){animation-delay:.32s}
.card:active{transform:scale(.96)}
.card:hover{border-color:transparent;box-shadow:0 6px 24px rgba(0,0,0,.09)}
.card .letter{font-size:42px;font-weight:900;line-height:1;letter-spacing:-1px;transition:transform .2s}
.card:hover .letter{transform:scale(1.06)}
.card .name{font-size:13px;font-weight:700;line-height:1.2;text-align:center}
.card .meta{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.card .meta .dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.card .meta .cnt{font-weight:600}
.card .arrow{position:absolute;top:10px;right:10px;width:16px;height:16px;color:var(--text2);opacity:.25}
@media(max-width:440px){
  .header{padding:28px 14px 10px}
  .header h1{font-size:21px}
  .grid{gap:8px}
  .card{padding:16px 10px 12px;border-radius:14px}
  .card .letter{font-size:34px}
  .card .name{font-size:12px}
}
@media(max-width:340px){.grid{grid-template-columns:1fr}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="header">
  <h1>⌨ 图形软件快捷键</h1>
  <div class="sub">9 款软件 · 1292 条快捷键 · 手机 / PC</div>
  <div class="bar"></div>
</div>
<div class="main">
  <div class="grid" id="grid"></div>
</div>
<script>
const apps=[
  {name:"3ds Max 2027",abbr:"MAX",count:136,cat:"三维建模",color:"var(--c1)",url:"https://lipsky-1977.github.io/3dsMax-Shortcuts/"},
  {name:"Blender 5.0+",abbr:"BLN",count:187,cat:"三维建模",color:"var(--c2)",url:"https://lipsky-1977.github.io/Blender-Shortcuts/"},
  {name:"Maya 2027",abbr:"MAY",count:158,cat:"三维建模",color:"var(--c3)",url:"https://lipsky-1977.github.io/Maya-Shortcuts/"},
  {name:"ZBrush 2026",abbr:"ZBR",count:122,cat:"三维雕刻",color:"var(--c4)",url:"https://lipsky-1977.github.io/ZBrush-Shortcuts/"},
  {name:"AutoCAD 2027",abbr:"CAD",count:159,cat:"CAD 制图",color:"var(--c6)",url:"https://lipsky-1977.github.io/AutoCAD-Shortcuts/"},
  {name:"Photoshop 2025",abbr:"PS",count:131,cat:"图像处理",color:"var(--c7)",url:"https://lipsky-1977.github.io/Photoshop-Shortcuts/"},
  {name:"Substance Painter",abbr:"SP",count:114,cat:"贴图绘制",color:"var(--c8)",url:"https://lipsky-1977.github.io/Substance-Painter-Shortcuts/"},
  {name:"CorelDRAW 2020+",abbr:"CDR",count:136,cat:"矢量图形",color:"var(--c9)",url:"https://lipsky-1977.github.io/CorelDRAW-Shortcuts/"},
  {name:"DaVinci Resolve",abbr:"DR",count:149,cat:"视频编辑",color:"var(--c10)",url:"https://lipsky-1977.github.io/DaVinci-Resolve-Shortcuts/"},
];
function render(){
  document.getElementById("grid").innerHTML=apps.map(a=>
    `<a class="card" href="${a.url}">
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <div class="letter" style="color:${a.color}">${a.abbr}</div>
      <div class="name">${a.name}</div>
      <div class="meta"><span class="dot" style="background:${a.color}"></span><span class="cnt">${a.count}</span> 条 · ${a.cat}</div>
    </a>`
  ).join("");
}
render();
</script>
</body>
</html>
